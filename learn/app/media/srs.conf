# Minimal SRS config placeholder for Phase 2
# This file documents the intended service role and expected LAN ports.
# Replace with a real SRS configuration during the actual media integration step.

listen              1935;
max_connections     1000;
daemon              off;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
}

rtc_server {
    enabled         on;
    listen          8000;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    6;
        hls_window      30;
    }

    rtc {
        enabled     on;
    }
}
