<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提瓦特 · 浮空秘境 | Genshin ARPG</title>

  <style>
    :root {
      --genshin-gold: #e2c073;
      --genshin-dark: rgba(28, 30, 35, 0.75);
      --genshin-light-glass: rgba(255, 255, 255, 0.15);
      --genshin-blue: #55b7db;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #000;
      user-select: none;
    }
    .app, .stage { width: 100%; height: 100%; position: absolute; inset: 0; }
    #game-root { position: absolute; inset: 0; z-index: 1; }
    #game-root canvas { display: block; width: 100%; height: 100%; outline: none; cursor: crosshair; }
    
    /* Genshin UI Overlay */
    /* Top Left: Mini Map */
    .minimap-container {
      position: absolute; top: 25px; left: 35px; z-index: 10;
      width: 140px; height: 140px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.4);
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }
    
    /* Top Right: Character Info */
    .top-right-bar {
      position: absolute; top: 25px; right: 35px; z-index: 10;
      display: flex; gap: 20px; align-items: center;
    }
    .currency-bar {
      display: flex; gap: 15px;
      background: var(--genshin-dark);
      padding: 5px 20px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .currency-item { display: flex; align-items: center; gap: 8px; font-size: 16px; color: #fff; font-weight: bold; }
    .currency-icon { width: 18px; height: 18px; border-radius: 50%; background: var(--genshin-gold); }
    .party-panel {
      position: absolute; top: 180px; right: 35px; z-index: 10;
      display: flex; flex-direction: column; gap: 15px;
    }
    .party-member {
      display: flex; align-items: center; justify-content: flex-end; gap: 15px;
      opacity: 0.6; transition: opacity 0.2s;
    }
    .party-member.active { opacity: 1; }
    .party-name { color: #fff; text-shadow: 1px 1px 2px #000; font-size: 15px; }
    .party-avatar {
      width: 50px; height: 50px; border-radius: 50%;
      background: linear-gradient(135deg, #1f2b38, #3b5f7a);
      border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    /* Bottom Right: Skills */
    .skills-container {
      position: absolute; bottom: 40px; right: 80px; z-index: 10;
      display: flex; gap: 20px; align-items: flex-end;
    }
    .skill-btn {
      position: relative;
      width: 70px; height: 70px; border-radius: 50%;
      background: radial-gradient(circle at center, rgba(30,50,70,0.8), rgba(10,20,30,0.95));
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: 0 0 15px rgba(0,0,0,0.6), inset 0 0 15px rgba(85,183,219,0.3);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, filter 0.1s;
    }
    .skill-btn.ultimate { width: 95px; height: 95px; border-color: var(--genshin-gold); box-shadow: 0 0 20px rgba(226,192,115,0.6); }
    .skill-icon { font-size: 24px; color: var(--genshin-blue); }
    .ultimate .skill-icon { color: var(--genshin-gold); font-size: 36px; }
    .skill-key {
      position: absolute; top: -5px; right: -5px;
      width: 24px; height: 24px; border-radius: 50%;
      background: #fff; color: #000;
      font-weight: bold; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }
    
    /* HD Premium Overlay Menus */
    .overlay {
      position: absolute; inset: 0; z-index: 100;
      background: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=2000&auto=format&fit=crop') center/cover;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.5s ease-in-out;
    }
    .overlay::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(10,20,30,0.4) 0%, rgba(5,10,15,0.9) 100%);
      backdrop-filter: blur(12px);
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }
    
    .overlay-card {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 50px 80px; border-radius: 20px;
      background: rgba(20, 25, 30, 0.6);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
      color: #fff; max-width: 900px;
    }
    .overlay-title {
      font-size: 56px; color: var(--genshin-gold); margin-bottom: 10px;
      font-family: "ZCOOL KuaiLe", cursive; 
      text-shadow: 0 0 30px rgba(226,192,115,0.6); letter-spacing: 4px;
    }
    .overlay-subtitle {
       font-size: 16px; color: #a4b4c4; margin-bottom: 40px; letter-spacing: 2px;
    }
    
    .character-selection {
       display: flex; gap: 40px; margin-bottom: 40px;
    }
    .char-card {
       width: 220px; height: 320px; border-radius: 12px;
       background: linear-gradient(145deg, rgba(40,50,60,0.8), rgba(20,25,30,0.9));
       border: 2px solid rgba(255,255,255,0.1);
       display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
       padding-bottom: 25px; cursor: pointer; position: relative; overflow: hidden;
       transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .char-card:hover {
       transform: translateY(-10px);
       border-color: var(--genshin-gold);
       box-shadow: 0 15px 35px rgba(226,192,115,0.3);
    }
    .char-card.selected {
       border-color: var(--genshin-gold);
       box-shadow: 0 0 40px rgba(226,192,115,0.5), inset 0 0 20px rgba(226,192,115,0.2);
    }
    .char-card.selected::after {
       content: '★'; position: absolute; top: 15px; right: 15px; color: var(--genshin-gold); font-size: 24px; text-shadow: 0 0 10px var(--genshin-gold);
    }
    .char-img {
       position: absolute; top: -10%; left: -20%; width: 140%; height: 120%;
       background-size: cover; background-position: center; opacity: 0.6; transition: opacity 0.3s;
       mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
       -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
    }
    .char-card.selected .char-img, .char-card:hover .char-img { opacity: 1; }
    
    .char-name { font-size: 24px; font-weight: bold; z-index: 2; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
    .char-desc { font-size: 14px; color: #b8c8d8; z-index: 2; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); text-align: center; padding: 0 15px; }

    .overlay-controls-help {
        display: flex; gap: 30px; margin-bottom: 40px; padding: 15px 30px;
        background: rgba(0,0,0,0.4); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
    }
    .help-item { display: flex; align-items: center; gap: 10px; color: #ddd; font-size: 14px; }
    .help-key { background: #eee; color: #222; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-family: monospace; }
    
    .buttons { display: flex; gap: 20px; justify-content: center; }
    .button {
      padding: 15px 60px; font-size: 20px; border-radius: 40px; cursor: pointer;
      border: none; color: #fff; font-weight: bold; transition: transform 0.2s, filter 0.2s;
    }
    .button:hover { transform: scale(1.05); filter: brightness(1.2); }
    .button.primary { background: linear-gradient(90deg, #d4af37, #f3e5ab); color: #111; box-shadow: 0 0 25px rgba(226,192,115,0.5); }
    .button.secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(4px); }

    .message-toast, .interaction-prompt {
      position: absolute; left: 50%; transform: translateX(-50%); z-index: 50;
      color: #fff; padding: 10px 30px; border-radius: 4px; border-left: 4px solid var(--genshin-gold);
      background: linear-gradient(90deg, rgba(0,0,0,0.8), rgba(0,0,0,0));
      font-size: 18px; transition: opacity 0.3s; pointer-events: none;
    }
    .message-toast { top: 15%; }
    .interaction-prompt { bottom: 20%; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.3); border-radius: 30px; }
    .hidden { opacity: 0; }
    
    /* Hide previous original elements to map them to new design or ignore */
    .hud { display: none; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "/node_modules/three/build/three.module.js",
        "three/addons/": "/node_modules/three/examples/jsm/",
        "@dimforge/rapier3d-compat": "/node_modules/@dimforge/rapier3d-compat/rapier.mjs",
        "@pixiv/three-vrm": "/node_modules/@pixiv/three-vrm/lib/three-vrm.module.js"
      }
    }
  </script>
  <script type="module" crossorigin src="/assets/index-B-QTZGCR.js"></script>
</head>
<body>
  <div class="app">
    <section class="stage">
      <div id="game-root"></div>
      
      <!-- Genshin UI Layers -->
      <div class="minimap-container"></div>
      
      <div class="top-right-bar">
        <div class="currency-bar">
          <div class="currency-item"><div class="currency-icon"></div> <span id="scoreValue">0</span></div>
          <div class="currency-item"><div class="currency-icon" style="background:var(--genshin-blue)"></div> <span id="coinValue">0</span></div>
        </div>
      </div>
      
      <div class="party-panel">
        <div class="party-member active">
          <span class="party-name" id="stateValue">Tartaglia</span>
          <div class="party-avatar"></div>
        </div>
        <div class="party-member">
          <span class="party-name">Member 2</span>
          <div class="party-avatar" style="opacity:0.3"></div>
        </div>
      </div>

      <div class="skills-container">
        <div class="skill-btn"><div class="skill-key">Q</div><div class="skill-icon">🌊</div></div>
        <div class="skill-btn"><div class="skill-key">W</div><div class="skill-icon">⚔️</div></div>
        <div class="skill-btn"><div class="skill-key">E</div><div class="skill-icon">🛡️</div></div>
        <div class="skill-btn ultimate"><div class="skill-key">R</div><div class="skill-icon">🐋</div></div>
      </div>

      <div class="message-toast hidden" id="messageToast"></div>
      <div class="interaction-prompt hidden" id="interactionPrompt"></div>

      <div class="overlay" id="overlay">
        <div class="overlay-card">
          <h2 class="overlay-title" id="overlayTitle">提瓦特 · 浮空秘境</h2>
          <div class="overlay-subtitle">A HIGH-FIDELITY OPEN WORLD EXPERIENCE</div>
          
          <div class="character-selection" id="characterSelection">
              <div class="char-card selected" data-char="tartaglia">
                  <div class="char-img" style="background-image: url('https://images.unsplash.com/photo-1542382156909-92408bcf15ab?q=80&w=600&auto=format&fit=crop');"></div>
                  <div class="char-name">达达利亚</div>
                  <div class="char-desc">水元素 · 狂潮之刃<br>近战刺客与重击手</div>
              </div>
              <div class="char-card" data-char="girl">
                  <div class="char-img" style="background-image: url('https://images.unsplash.com/photo-1578351545620-332e65c9fa4b?q=80&w=600&auto=format&fit=crop');"></div>
                  <div class="char-name">星空圣女</div>
                  <div class="char-desc">灵动迅敏 · 繁星绽放<br>轻盈优雅的高速剑士</div>
              </div>
          </div>
          
          <div class="overlay-controls-help">
             <div class="help-item">移动 <span class="help-key">鼠标右键</span></div>
             <div class="help-item">普攻 <span class="help-key">左键</span></div>
             <div class="help-item">水刃之舞 <span class="help-key">Q</span> <span class="help-key">W</span> <span class="help-key">E</span> <span class="help-key">R</span></div>
          </div>

          <div class="buttons">
            <button class="button primary" id="primaryButton">开始沉浸体验</button>
            <button class="button secondary" id="secondaryButton" style="display:none;">环境设置</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
